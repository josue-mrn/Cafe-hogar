<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Productos | Café Hogar</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cafecito: {
                            dark: '#2B170C',
                            medium: '#6F4E37',
                            light: '#A87C5C',
                            accent: '#C79A65',
                            cream: '#FCF9F5',
                            card: '#FFFFFF',
                            accentHover: '#B58652'
                        }
                    },
                    fontFamily: {
                        serif: ['Inria Serif', 'serif'],
                        sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inria+Serif:wght@300;400;700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body {
            font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
            background-color: #FFF3E6;
        }
        .font-title {
            font-family: 'Inria Serif', serif;
        }
    </style>
</head>
<body>
    <!-- Botón Regresar -->
    <a href="../index.html" class="fixed top-6 left-6 z-50 bg-cafecito-dark text-cafecito-cream px-5 py-2.5 rounded-full shadow-lg hover:bg-cafecito-accent hover:text-cafecito-dark transition-all duration-300 flex items-center gap-2 font-bold text-sm tracking-wider uppercase">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
        </svg>
        Regresar
    </a>

    <main class="py-24 px-6 max-w-7xl mx-auto">
        <div class="text-center max-w-2xl mx-auto mb-16 mt-8">
            <span class="text-xs font-black uppercase tracking-widest text-cafecito-accent mb-3 block">Catálogo Completo</span>
            <h1 class="font-title text-4xl md:text-5xl font-bold text-cafecito-dark">Nuestros Productos</h1>
            <p class="text-cafecito-dark/70 text-sm mt-4">
                Explora nuestra selección completa de cafés artesanales y accesorios.
            </p>
        </div>

        <!-- Contenedor de Productos -->
        <div id="catalog-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <!-- Se llena dinámicamente -->
        </div>
    </main>

    <!-- Modal de Detalles de Producto -->
    <div id="product-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm opacity-0 pointer-events-none transition-all duration-300">
        <div class="bg-white rounded-[2rem] w-full max-w-3xl overflow-hidden shadow-2xl border border-cafecito-medium/10 transform scale-95 transition-all duration-300 flex flex-col md:flex-row relative">
            <button id="close-modal-btn" class="absolute top-4 right-4 bg-white/95 border border-cafecito-medium/10 shadow-md p-2 rounded-full text-cafecito-dark hover:text-cafecito-accent transition-colors z-10" aria-label="Cerrar modal">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                </svg>
            </button>
            <div class="w-full md:w-1/2 aspect-square md:aspect-auto relative bg-cafecito-cream">
                <img id="modal-product-image" src="" alt="" class="w-full h-full object-cover">
            </div>
            <div class="w-full md:w-1/2 p-8 md:p-10 flex flex-col justify-center gap-5">
                <span id="modal-product-brand" class="inline-block px-2.5 py-0.5 bg-cafecito-accent/15 rounded-full text-[10px] font-bold uppercase tracking-wider text-cafecito-medium w-fit">Marca</span>
                <h3 id="modal-product-title" class="font-title text-3xl font-bold text-cafecito-dark leading-tight">Título del Producto</h3>
                <p id="modal-product-desc" class="text-sm text-cafecito-dark/70 leading-relaxed">Descripción del café.</p>
                <div class="border-t border-cafecito-cream pt-5">
                    <span class="block text-xs font-semibold text-cafecito-dark/50 uppercase tracking-wider mb-1">Precio referencial</span>
                    <span id="modal-product-price" class="text-3xl font-black text-cafecito-medium">Q0.00</span>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/catalog.js"></script>
</body>
</html>
